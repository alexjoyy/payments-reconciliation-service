server:
  port: ${PORT:8083}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5436/reconciliation_db}
    username: ${DB_USERNAME:reconciliation_user}
    password: ${DB_PASSWORD:reconciliation_pass}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: ${SQL_INIT_MODE:always}

management:
  endpoints:
    web:
      exposure:
        include: health,info

reconciliation:
  schedule:
    cron: ${RECON_CRON:0 0 * * * *}
