services:
  - type: web
    name: payments-reconciliation-service
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_URL
        fromDatabase:
          name: payments-reconciliation-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: payments-reconciliation-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: payments-reconciliation-db
          property: password
      - key: SQL_INIT_MODE
        value: always

databases:
  - name: payments-reconciliation-db
    plan: free
